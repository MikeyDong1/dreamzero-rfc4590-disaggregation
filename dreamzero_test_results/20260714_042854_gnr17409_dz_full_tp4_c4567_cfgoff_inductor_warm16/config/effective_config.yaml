# DreamZero-DROID FULL/MONOLITHIC deploy: TP=4 on physical cards 4,5,6,7.
# Standing test setup: CFG off (cfg_scale=1.0), torch.compile/inductor ON
# (enforce_eager=false), denoise_steps=16, raw/unencoded camera MP4 input.
#
# Based on the validated dreamzero_tp4.yaml / dreamzero_tp4_cards4567.yaml
# topology (monolithic 'dreamzero' pipeline requires the AR-Diffusion engine
# for KV-cache management even on a single stage).
#
# NOTE: 'devices' below is CONTAINER-RELATIVE (0-3). The container is started
# with ZE_AFFINITY_MASK=4,5,6,7 which restricts + renumbers physical cards
# 4,5,6,7 as xpu:0-3 inside the container.

pipeline: dreamzero
async_chunk: false
distributed_executor_backend: mp
dtype: bfloat16

stages:
  - stage_id: 0
    devices: "0,1,2,3"
    max_num_seqs: 1
    enforce_eager: false
    model_class_name: DreamZeroPipeline
    engine_backend: vllm_omni.experimental.ar_diffusion.engine.ARDiffusionEngine
    parallel_config:
      tensor_parallel_size: 4
      cfg_parallel_size: 1
    model_config:
      default_robot_embodiment: roboarena
      cfg_scale: 1.0
      num_inference_steps: 16
      policy_server_config:
        image_resolution: [180, 320]
        n_external_cameras: 2
        needs_wrist_camera: true
        needs_stereo_camera: false
        needs_session_id: true
        action_space: joint_position

# --- resolved orchestrator-level settings (from timed_export_full_tp4_c4567_cfgoff_inductor_warm.py) ---
# model: GEAR-Dreams/DreamZero-DROID
# assets_repo: YangshenDeng/vllm-omni-dreamzero-assets
# serving_mode: offline
# proxy: 0  (not a supported field on this revision; no proxy layer used in offline inference path)
# denoise_steps: 16  (model_config.num_inference_steps in deploy YAML)
# cfg_scale: 1.0 (CFG off)
# enforce_eager: false (torch.compile/inductor ON)
# devices (container-relative): 0,1,2,3 -> physical cards 4,5,6,7 via ZE_AFFINITY_MASK
# tensor_parallel_size: 4
