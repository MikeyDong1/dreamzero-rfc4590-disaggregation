# DreamZero-DROID FULL/MONOLITHIC: TP=4 cards 4,5,6,7, CFG off, inductor ON,
# denoise_steps=16, raw camera MP4 input, LAYERWISE CPU OFFLOAD.
#
# Root cause of prior DEVICE_LOST crashes: TP=4 alone OOMs the ~22.7GiB B60 in
# the attention forward (VM worker error -12 = ENOMEM -> exec queue reset ->
# UR_RESULT_ERROR_DEVICE_LOST). The proven dreamzero_tp4_offload_nopin.yaml uses
# layerwise offload so only ~1 DiT block is resident per rank; this config
# mirrors it and adds the standing cfg-off / inductor / denoise-16 settings.
#
# NOTE: 'devices' is CONTAINER-RELATIVE (0-3); the container restricts to
# physical cards 4,5,6,7 via ZE_AFFINITY_MASK.

pipeline: dreamzero
async_chunk: false
distributed_executor_backend: mp
dtype: bfloat16

stages:
  - stage_id: 0
    devices: "0,1,2,3"
    max_num_seqs: 1
    enforce_eager: false
    model_class_name: DreamZeroPipeline
    engine_backend: vllm_omni.experimental.ar_diffusion.engine.ARDiffusionEngine
    enable_layerwise_offload: true
    pin_cpu_memory: false
    parallel_config:
      tensor_parallel_size: 4
      cfg_parallel_size: 1
    model_config:
      default_robot_embodiment: roboarena
      cfg_scale: 1.0
      num_inference_steps: 16
      # Disable the eager AR-Diffusion cudagraph warm-up: it runs an extra synthetic
      # rollout that spikes device memory past the ~22.7GiB B60 ceiling (error 40 =
      # OUT_OF_RESOURCES -> DEVICE_LOST) on top of the real inference. The warmup was
      # already failing over to "lazy capture", so disabling it only removes the spike.
      ar_diffusion_kv_config:
        warmup_cudagraph: false
      policy_server_config:
        image_resolution: [180, 320]
        n_external_cameras: 2
        needs_wrist_camera: true
        needs_stereo_camera: false
        needs_session_id: true
        action_space: joint_position
