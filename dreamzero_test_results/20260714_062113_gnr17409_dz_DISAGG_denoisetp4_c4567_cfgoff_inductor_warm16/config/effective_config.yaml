# DreamZero DISAGGREGATED (RFC #4590): encode -> denoise -> decode.
# Denoise = TP=4 on physical cards 4,5,6,7 (container xpu:1-4 via ZE_AFFINITY_MASK=1,4,5,6,7,0).
# CFG off, inductor ON on denoise, denoise_steps=16, raw camera MP4 input, warm-only.
#
# KEY DIFFERENCE vs monolithic: each stage builds ONLY its own components
# (required_components_for_stage), so the ~11GB UMT5 text encoder + image encoder +
# VAE are NOT replicated across the 4 DiT/TP ranks. Encode owns them on ONE card;
# the denoise TP ranks hold only the DiT shard (~10 GiB/card DiT-only) -> should fit
# WITHOUT layerwise offload, unlike the monolithic path.
#
# Container-relative devices (ZE_AFFINITY_MASK=1,4,5,6,7,0):
#   xpu:0 -> phys card 1  (encode)
#   xpu:1,2,3,4 -> phys cards 4,5,6,7  (denoise TP4)
#   xpu:5 -> phys card 0  (decode)

pipeline: dreamzero_disaggregated
async_chunk: false
distributed_executor_backend: mp
dtype: bfloat16

stages:
  # ---- Stage 0: ENCODE (tokenizer + text/image encoders + VAE encoder; 1 card) ----
  - stage_id: 0
    devices: "0"
    max_num_seqs: 1
    enforce_eager: true
    model_class_name: DreamZeroPipeline
    model_config:
      default_robot_embodiment: roboarena
      cfg_scale: 1.0
      num_inference_steps: 16
      policy_server_config:
        image_resolution: [180, 320]
        n_external_cameras: 2
        needs_wrist_camera: true
        needs_stereo_camera: false
        needs_session_id: true
        action_space: joint_position

  # ---- Stage 1: DENOISE (CausalWan DiT + schedulers + action head + AR-Diffusion KV; TP=4) ----
  - stage_id: 1
    devices: "1,2,3,4"
    max_num_seqs: 1
    enforce_eager: false
    model_class_name: DreamZeroPipeline
    engine_backend: vllm_omni.experimental.ar_diffusion.engine.ARDiffusionEngine
    parallel_config:
      tensor_parallel_size: 4
      cfg_parallel_size: 1
    model_config:
      default_robot_embodiment: roboarena
      cfg_scale: 1.0
      num_inference_steps: 16
      ar_diffusion_kv_config:
        warmup_cudagraph: false
      policy_server_config:
        image_resolution: [180, 320]
        n_external_cameras: 2
        needs_wrist_camera: true
        needs_stereo_camera: false
        needs_session_id: true
        action_space: joint_position

  # ---- Stage 2: DECODE (VAE decoder + postprocess; 1 card) ----
  - stage_id: 2
    devices: "5"
    max_num_seqs: 1
    enforce_eager: true
    model_class_name: DreamZeroPipeline
    model_config:
      default_robot_embodiment: roboarena
      cfg_scale: 1.0
      num_inference_steps: 16
      policy_server_config:
        image_resolution: [180, 320]
        n_external_cameras: 2
        needs_wrist_camera: true
        needs_stereo_camera: false
        needs_session_id: true
        action_space: joint_position
