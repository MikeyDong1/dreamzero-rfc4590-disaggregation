# DreamZero-DROID disaggregated deploy (RFC #4590): encode -> denoise -> decode.
# Variant: TP=4 DENOISE, CFG OFF, inductor ON (denoise enforce_eager=false),
# DECODE ON A SEPARATE CARD (not co-resident with encode).
#
# Device placement (6 devices): encode + denoise TP4 + decode, all distinct.
# Container-relative indices below; map to physical cards with ZE_AFFINITY_MASK
# at launch. This run uses ZE_AFFINITY_MASK=0,3,4,5,6,7 =>
#   container xpu:0 = phys card 0  (encode)
#   container xpu:1 = phys card 3  (decode, SEPARATE)
#   container xpu:2 = phys card 4  (denoise rank 0)
#   container xpu:3 = phys card 5  (denoise rank 1)
#   container xpu:4 = phys card 6  (denoise rank 2)
#   container xpu:5 = phys card 7  (denoise rank 3)
#
# ar_diffusion_kv_config.warmup_cudagraph disabled on denoise (its synthetic
# warm-up rollout spikes memory past the per-card ceiling without offload).

pipeline: dreamzero_disaggregated
async_chunk: false
distributed_executor_backend: mp
dtype: bfloat16

stages:
  # ---- Stage 0: ENCODE (standard diffusion engine, one device: xpu:0=phys0) ----
  - stage_id: 0
    devices: "0"
    max_num_seqs: 1
    enforce_eager: true
    model_class_name: DreamZeroPipeline
    model_config:
      default_robot_embodiment: roboarena
      cfg_scale: 1.0
      num_inference_steps: 16
      policy_server_config:
        image_resolution: [180, 320]
        n_external_cameras: 2
        needs_wrist_camera: true
        needs_stereo_camera: false
        needs_session_id: true
        action_space: joint_position

  # ---- Stage 1: DENOISE (AR-Diffusion engine; TP=4; CFG off; inductor on) ----
  #      devices xpu:2,3,4,5 = phys cards 4,5,6,7
  - stage_id: 1
    devices: "2,3,4,5"
    max_num_seqs: 1
    enforce_eager: false
    model_class_name: DreamZeroPipeline
    engine_backend: vllm_omni.experimental.ar_diffusion.engine.ARDiffusionEngine
    parallel_config:
      tensor_parallel_size: 4
      cfg_parallel_size: 1
    model_config:
      default_robot_embodiment: roboarena
      cfg_scale: 1.0
      num_inference_steps: 16
      ar_diffusion_kv_config:
        warmup_cudagraph: false
      policy_server_config:
        image_resolution: [180, 320]
        n_external_cameras: 2
        needs_wrist_camera: true
        needs_stereo_camera: false
        needs_session_id: true
        action_space: joint_position

  # ---- Stage 2: DECODE (standard diffusion engine, SEPARATE device: xpu:1=phys3) ----
  - stage_id: 2
    devices: "1"
    max_num_seqs: 1
    enforce_eager: true
    model_class_name: DreamZeroPipeline
    model_config:
      default_robot_embodiment: roboarena
      cfg_scale: 1.0
      num_inference_steps: 16
      policy_server_config:
        image_resolution: [180, 320]
        n_external_cameras: 2
        needs_wrist_camera: true
        needs_stereo_camera: false
        needs_session_id: true
        action_space: joint_position
