[pytest]
# RFC #4590 disaggregated-diffusion tests.
#
# The torch-free foundation tests under tests/diffusion/disaggregated/ load the
# source modules directly by file path (see that conftest.py), so they run
# without importing the vllm_omni package or torch. importlib import-mode keeps
# the test files out of any package namespace (the vendored vllm_omni/ tree has
# an __init__ that imports torch, which is unavailable on this host).
testpaths = tests
addopts = --import-mode=importlib
markers =
    needs_runtime: test requires the full torch/vllm-omni runtime (skipped when absent)
