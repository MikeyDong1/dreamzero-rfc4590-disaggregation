# DreamZero-DROID deploy: TP=2, CFG parallel size=2 (4 devices).
#
# Topology is declared in vllm_omni/model_executor/models/dreamzero/pipeline.py.
# Listed devices must equal tensor_parallel_size * cfg_parallel_size = 2 * 2 = 4.

pipeline: dreamzero
async_chunk: false
distributed_executor_backend: mp
dtype: bfloat16

stages:
  - stage_id: 0
    devices: "0,1,2,3"
    max_num_seqs: 1
    enforce_eager: true
    model_class_name: DreamZeroPipeline
    parallel_config:
      tensor_parallel_size: 2
      cfg_parallel_size: 2
    model_config:
      default_robot_embodiment: roboarena
      policy_server_config:
        image_resolution: [180, 320]
        n_external_cameras: 2
        needs_wrist_camera: true
        needs_stereo_camera: false
        needs_session_id: true
        action_space: joint_position
